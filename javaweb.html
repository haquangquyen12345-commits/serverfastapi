<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HUST IoT - Dashboard Real-time (SQL)</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body { background-color: #f4f7f6; font-family: 'Segoe UI', sans-serif; }
        .card { border: none; border-radius: 15px; box-shadow: 0 4px 10px rgba(0,0,0,0.08); transition: 0.3s; }
        .stat-card { border-left: 6px solid #0d6efd; }
        .log-container { max-height: 380px; overflow-y: auto; background: white; border-radius: 10px; }
        .table thead { position: sticky; top: 0; background: #fff; z-index: 2; }
        /* Đèn LED (Tạm thời để mô phỏng vì server chưa có nút nhấn) */
        .led-indicator { width: 25px; height: 25px; border-radius: 50%; background-color: #bbb; display: inline-block; }
        .led-wait { background-color: #f1c40f; box-shadow: 0 0 10px #f1c40f; }
    </style>
</head>
<body>

<div class="container py-4">
    <div class="d-flex justify-content-between align-items-center mb-4 bg-white p-3 rounded card">
        <div>
            <h4 class="fw-bold mb-0 text-primary"><i class="bi bi-database-fill-check"></i> MONITORING SYSTEM</h4>
            <small class="text-muted">HUST Lab - Connected to PostgreSQL via psycopg2</small>
        </div>
        <span id="connectionStatus" class="badge bg-warning text-dark p-2">Đang đợi dữ liệu...</span>
    </div>

    <div class="row g-3 mb-4 text-center">
        <div class="col-md-3">
            <div id="cardLux" class="card p-3 stat-card h-100">
                <small class="fw-bold text-muted text-uppercase">Ánh sáng hiện tại</small>
                <h2 id="luxValue" class="display-5 fw-bold text-primary my-2">--</h2>
                <small class="text-muted">Lux</small>
            </div>
        </div>
        <div class="col-md-3">
            <div class="card p-3 border-start border-success border-5 h-100">
                <small class="fw-bold text-muted text-uppercase">Trạng thái</small>
                <h3 id="statusText" class="fw-bold text-success my-2">--</h3>
                <small id="timeUpdate" class="text-muted">--:--:--</small>
            </div>
        </div>
        <div class="col-md-3">
            <div class="card p-3 border-start border-danger border-5 h-100">
                <small class="fw-bold text-muted text-uppercase">Lớn nhất (Max)</small>
                <h2 id="maxValue" class="display-6 fw-bold text-danger my-2">0</h2>
            </div>
        </div>
        <div class="col-md-3">
            <div class="card p-3 border-start border-warning border-5 h-100">
                <small class="fw-bold text-muted text-uppercase">Nhỏ nhất (Min)</small>
                <h2 id="minValue" class="display-6 fw-bold text-warning my-2">1000</h2>
            </div>
        </div>
    </div>

    <div class="card p-4 mb-4">
        <div class="row align-items-center">
            <div class="col-md-3">
                <label class="form-label small fw-bold">NGƯỠNG CẢNH BÁO</label>
                <input type="number" id="thresholdInput" class="form-control" value="600">
            </div>
            <div class="col-md-3 text-center border-start border-end">
                <label class="form-label small fw-bold d-block">THIẾT BỊ (MÔ PHỎNG)</label>
                <div id="ledIndicator" class="led-indicator led-wait"></div>
                <small class="d-block text-muted">Chờ dữ liệu Button</small>
            </div>
            <div class="col-md-6 text-md-end">
                <button id="btnPause" class="btn btn-outline-primary btn-sm" onclick="togglePause()">Tạm dừng</button>
                <button class="btn btn-outline-danger btn-sm mx-1" onclick="resetStats()">Reset</button>
                <button class="btn btn-success btn-sm" onclick="exportCSV()">Xuất Excel</button>
            </div>
        </div>
    </div>

    <div class="row">
        <div class="col-lg-7 mb-4">
            <div class="card p-4 h-100">
                <h6 class="fw-bold mb-3"><i class="bi bi-graph-up"></i> BIỂU ĐỒ THỜI GIAN THỰC</h6>
                <canvas id="lightChart"></canvas>
            </div>
        </div>
        <div class="col-lg-5 mb-4">
            <div class="card p-4 h-100">
                <h6 class="fw-bold mb-3"><i class="bi bi-table"></i> NHẬT KÝ DỮ LIỆU SQL</h6>
                <div class="log-container border">
                    <table class="table table-sm table-hover text-center mb-0">
                        <thead class="table-light">
                            <tr>
                                <th>#</th>
                                <th>Thời gian</th>
                                <th>Giá trị (Lux)</th>
                            </tr>
                        </thead>
                        <tbody id="dataTableBody"></tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
    let isPaused = false;
    let maxLux = 0;
    let minLux = 1000;
    let stt = 0;
    let history = [];
    const API_URL = "http://127.0.0.1:8000/api/data";

    // KHỞI TẠO BIỂU ĐỒ
    const ctx = document.getElementById('lightChart').getContext('2d');
    const chart = new Chart(ctx, {
        type: 'line',
        data: {
            labels: [],
            datasets: [{
                label: 'Cường độ sáng',
                data: [],
                borderColor: '#0d6efd',
                backgroundColor: 'rgba(13, 110, 253, 0.1)',
                fill: true,
                tension: 0.4
            }]
        },
        options: { responsive: true, plugins: { legend: { display: false } } }
    });

    function togglePause() { isPaused = !isPaused; document.getElementById('btnPause').innerText = isPaused ? "Tiếp tục" : "Tạm dừng"; }
    function resetStats() { maxLux = 0; minLux = 1000; document.getElementById('maxValue').innerText = "0"; document.getElementById('minValue').innerText = "1000"; }
    function exportCSV() {
        let csv = "\uFEFFSTT,Thoi Gian,Lux\n";
        history.forEach((item, index) => csv += `${index+1},${item.time},${item.val}\n`);
        const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
        const link = document.createElement("a");
        link.href = URL.createObjectURL(blob);
        link.download = "Bao_cao_HUST.csv";
        link.click();
    }

    // --- HÀM CẬP NHẬT TỪ SERVER PSYCOPG2 ---
    async function updateData() {
        if (isPaused) return;

        try {
            const response = await fetch(API_URL);
            const data = await response.json();

            if (data.length === 0) return;

            // Lấy bản ghi mới nhất (Server trả về desc nên data[0] là mới nhất)
            const latest = data[0];
            const lux = latest.lux;
            const time = latest.timestamp;

            // 1. Connection UI
            document.getElementById('connectionStatus').className = "badge bg-success p-2";
            document.getElementById('connectionStatus').innerText = "Kết nối SQL: OK";

            // 2. Cập nhật thẻ Lux & Cảnh báo
            const threshold = document.getElementById('thresholdInput').value;
            document.getElementById('luxValue').innerText = lux;
            if (lux > threshold) {
                document.getElementById('cardLux').classList.add("bg-danger", "text-white");
            } else {
                document.getElementById('cardLux').classList.remove("bg-danger", "text-white");
            }

            // 3. Max/Min
            if (lux > maxLux) maxLux = lux;
            if (lux < minLux) minLux = lux;
            document.getElementById('maxValue').innerText = maxLux;
            document.getElementById('minValue').innerText = minLux;

            // 4. Status
            let status = "Ổn định"; let color = "text-success";
            if (lux < 200) { status = "Tối"; color = "text-secondary"; }
            else if (lux > 600) { status = "Quá sáng"; color = "text-danger"; }
            document.getElementById('statusText').innerText = status;
            document.getElementById('statusText').className = `fw-bold ${color} my-2`;
            document.getElementById('timeUpdate').innerText = "Cập nhật: " + time;

            // 5. Chart
            chart.data.labels.push(time);
            chart.data.datasets[0].data.push(lux);
            if (chart.data.labels.length > 15) { chart.data.labels.shift(); chart.data.datasets[0].data.shift(); }
            chart.update('none');

            // 6. Table
            stt++;
            history.push({time: time, val: lux});
            const row = `<tr><td>${stt}</td><td>${time}</td><td class="fw-bold">${lux}</td></tr>`;
            document.getElementById('dataTableBody').insertAdjacentHTML('afterbegin', row);

        } catch (error) {
            document.getElementById('connectionStatus').className = "badge bg-danger p-2";
            document.getElementById('connectionStatus').innerText = "Lỗi kết nối Server!";
        }
    }

    setInterval(updateData, 2000);
</script>
</body>
</html>
